ai:
  skills:
    - id: addyosmani-agent-skills
      type: git
      source: https://github.com/addyosmani/agent-skills.git
      path: skills
      hosts: [claude, codex, opencode]
    - id: respond-structured
      type: local
      path: .local/share/ai-skills
      hosts: [claude, codex, opencode]

  claude:
    marketplaces:
      - name: superclaude
        source: SuperClaude-Org/SuperClaude_Plugin
      - name: superpowers-marketplace
        source: obra/superpowers-marketplace
      - name: ponytail
        source: DietrichGebert/ponytail
    plugins:
      - superpowers@superpowers-marketplace
      - ponytail@ponytail

  codex:
    marketplaces:
      - name: ponytail
        source: DietrichGebert/ponytail
    plugins:
      - ponytail@ponytail

  opencode:
    plugins:
      - "@bybrawe/opencode-loop"
      - "@khalilgharbaoui/opencode-claude-code-plugin"
      - "@dietrichgebert/ponytail"
