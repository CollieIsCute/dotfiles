[shell]
font_family = "JetBrainsMono Nerd Font"
telemetry_enabled = false
polkit_agent = false
clipboard_enabled = true
clipboard_history_max_entries = 100
clipboard_auto_paste = "auto"

[shell.panel]
launcher_placement = "centered"
clipboard_placement = "centered"
control_center_placement = "attached"
wallpaper_placement = "attached"
session_placement = "attached"

[shell.screenshot]
save_to_file = false
copy_to_clipboard = true
freeze_screen = false
pipe_to_command = false

[wallpaper]
enabled = true
fill_mode = "crop"
directory = "~/.config/wallpapers"
transition_on_startup = false

[wallpaper.default]
path = "~/.config/wallpapers/xp_wallpaper.jpg"

[theme]
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

[theme.templates]
enable_builtin_templates = false
enable_community_templates = false
builtin_ids = []
community_ids = []

[theme.templates.user.alacritty]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/alacritty.toml"
output_path = "$XDG_CONFIG_HOME/alacritty/themes/noctalia.toml"

[theme.templates.user.ghostty]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/ghostty"
output_path = "$XDG_CONFIG_HOME/ghostty/themes/noctalia"
post_hook = "pgrep -f ghostty >/dev/null && pkill -SIGUSR2 ghostty || true"

[theme.templates.user.kitty]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/kitty.conf"
output_path = "$XDG_CONFIG_HOME/kitty/themes/noctalia.conf"
post_hook = "pkill -x -USR1 kitty >/dev/null 2>&1 || true"

[notification]
enable_daemon = true
show_app_name = true
layer = "top"
background_opacity = 0.97

[osd]
position = "top_center"
orientation = "horizontal"
scale = 1.0

[lockscreen]
enabled = true
blurred_desktop = true
blur_intensity = 0.5
tint_intensity = 0.3

[system.monitor]
enabled = true

[weather]
enabled = true

[location]
address = "taipei"

[audio]
enable_overdrive = false
enable_sounds = false

[brightness]
enable_ddcutil = false

[idle]
pre_action_fade_seconds = 2.0

[idle.behavior.lock]
enabled = true
timeout = 300
command = "noctalia:session lock"

[idle.behavior.screen-off]
enabled = true
timeout = 600
command = "noctalia:dpms-off"
resume_command = "noctalia:dpms-on"

[keybinds]
validate = ["return", "kp_enter"]
cancel = ["escape"]
left = ["left"]
right = ["right"]
up = ["up"]
down = ["down"]

[bar]
order = ["main"]

[bar.main]
enabled = true
position = "top"
auto_hide = false
reserve_space = true
layer = "top"
thickness = 33
background_opacity = 0.0
radius = 0
margin_ends = 0
margin_edge = 0
padding = 5
widget_spacing = 3
scale = 1.1
shadow = false
capsule = true
capsule_fill = "surface_variant"
capsule_opacity = 0.3
color = "primary"
icon_color = "primary"
start = ["tray", "media"]
center = ["clock", "workspaces"]
end = ["volume", "group:net-status", "group:sys-status", "notifications", "clipboard", "session"]

[[bar.main.capsule_group]]
id = "net-status"
members = ["net-down", "net-up"]
fill = "surface_variant"
padding = 6.0
opacity = 0.3

[[bar.main.capsule_group]]
id = "sys-status"
members = ["cpu", "ram", "temp", "battery"]
fill = "surface_variant"
padding = 3.0
opacity = 0.3

[widget.clock]
format = "{:%B %d %H:%M:%S}"
tooltip_format = "{:%A, %B %d, %Y}"

[widget.media]
hide_when_no_media = true
max_length = 320

[widget.net-down]
type = "sysmon"
stat = "net_rx"
display = "text"

[widget.net-up]
type = "sysmon"
stat = "net_tx"
display = "text"

[widget.cpu]
type = "sysmon"
stat = "cpu_usage"
display = "text"

[widget.temp]
type = "sysmon"
stat = "cpu_temp"
display = "text"

[widget.ram]
type = "sysmon"
stat = "ram_pct"
display = "text"

[widget.volume]
show_label = true

[widget.battery]
show_label = true

[widget.notifications]
hide_when_no_unread = false

[widget.tray]
drawer = false

[dock]
enabled = false
